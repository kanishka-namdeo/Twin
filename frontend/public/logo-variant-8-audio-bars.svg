<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bars-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0052FF" />
      <stop offset="100%" stop-color="#4D7CFF" />
    </linearGradient>
    
    <linearGradient id="bars-gradient-dark" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4D7CFF" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
  </defs>
  
  <style>
    .gradient { fill: url(#bars-gradient); }
    .surface { fill: #FFFFFF; }
    
    @media (prefers-color-scheme: dark) {
      .gradient { fill: url(#bars-gradient-dark); }
      .surface { fill: #0F172A; }
    }
  </style>
  
  <!-- Audio bars concept: Transcription/audio visualization -->
  <g id="logo-mark">
    <!-- Rounded rectangle background -->
    <rect x="10" y="10" width="80" height="80" rx="16" class="surface" />
    <rect x="14" y="14" width="72" height="72" rx="12" class="gradient" opacity="0.1" />
    
    <!-- Audio bars (equalizer style) -->
    <rect x="20" y="35" width="8" height="30" rx="2" class="gradient" />
    <rect x="32" y="25" width="8" height="50" rx="2" class="gradient" />
    <rect x="44" y="20" width="8" height="60" rx="2" class="gradient" />
    <rect x="56" y="30" width="8" height="40" rx="2" class="gradient" />
    <rect x="68" y="40" width="8" height="20" rx="2" class="gradient" />
    
    <!-- "T" overlay hint -->
    <circle cx="50" cy="50" r="8" class="surface" opacity="0.4" />
  </g>
</svg>